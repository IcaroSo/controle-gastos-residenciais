services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/controle-gastos.db;Foreign Keys=True"
      Database__ApplyMigrationsOnStartup: "true"
      Cors__AllowedOrigins__0: http://localhost:3000
    volumes:
      - controle-gastos-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  controle-gastos-data:
